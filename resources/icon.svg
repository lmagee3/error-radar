<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <!-- Outer radar ring -->
  <circle cx="12" cy="12" r="9.5" stroke="currentColor" stroke-width="1.5"/>
  <!-- Middle ring -->
  <circle cx="12" cy="12" r="5.5" stroke="currentColor" stroke-width="1"/>
  <!-- Sweep line (center to upper-right) -->
  <line x1="12" y1="12" x2="19.2" y2="8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="12" cy="12" r="1.2" fill="currentColor"/>
  <!-- Blip dot -->
  <circle cx="17" cy="8.5" r="1.5" fill="currentColor"/>
</svg>
